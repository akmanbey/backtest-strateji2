name: HeroX Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları kur
        run: |
          pip install playwright pandas
          playwright install chromium
          playwright install-deps chromium

      - name: Backtest çalıştır
        env:
          TV_SESSIONID: ${{ secrets.TV_SESSIONID }}
          TV_SESSIONID_SIGN: ${{ secrets.TV_SESSIONID_SIGN }}
          TV_CHART_URL: ${{ secrets.TV_CHART_URL }}
        run: python backtest.py

      - name: Sonuçları yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-sonuclari
          path: results/
